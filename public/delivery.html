<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>餐飲配送庫存管理</title>
<style>
/* ── 變數 ── */
:root {
  --green:       #134532;
  --green-mid:   #1c5e44;
  --green-light: #e8f0eb;
  --green-pale:  #f2f6f3;
  --gold:        #D5C78C;
  --gold-dark:   #b8a96a;
  --gold-light:  #faf7ed;
  --gold-border: #e8ddb0;
  --bg:          #f0f2f0;
  --surface:     #ffffff;
  --border:      #dde3de;
  --text:        #111c17;
  --text-2:      #4a5c52;
  --text-3:      #8a9e92;
  --success:     #2e7d52;
  --warning:     #b8860b;
  --danger:      #c0392b;
  --danger-bg:   #fdecea;
  --warn-bg:     #fdf8e1;
  --radius:      14px;
  --radius-sm:   9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
@keyframes spin  { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

/* ── 版面 ── */
html { height: 100%; }
body { min-height:100%; background:#e8ecef; font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif; display:flex; justify-content:center; }
.phone { width:100%; max-width:480px; min-height:100vh; background:var(--bg); position:relative; flex-shrink:0; }

/* ── Header ── */
.hd { background:var(--green); padding:52px 18px 0; position:sticky; top:0; z-index:100; }
.hd-top { display:flex; align-items:flex-start; justify-content:space-between; padding-bottom:14px; }
.hd-greet { color:rgba(255,255,255,.6); font-size:12px; margin-bottom:3px; }
.hd-name { color:#fff; font-size:20px; font-weight:700; }
.avatar { width:38px; height:38px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; color:var(--green); font-size:14px; font-weight:800; flex-shrink:0; }

/* ── Quick btns ── */
.quick-row { margin:14px 14px 0; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.qbtn { border-radius:var(--radius); padding:16px 14px; display:flex; flex-direction:column; gap:8px; cursor:pointer; transition:transform .13s; border:none; text-align:left; }
.qbtn:active { transform:scale(.97); }
.qbtn.go  { background:var(--green); }
.qbtn.ret { background:var(--gold-light); border:1.5px solid var(--gold-border); }
.qbtn-icon  { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; }
.qbtn.go  .qbtn-icon  { background:rgba(255,255,255,.15); }
.qbtn.ret .qbtn-icon  { background:rgba(213,199,140,.35); }
.qbtn-title { font-size:14px; font-weight:700; }
.qbtn.go  .qbtn-title { color:#fff; }
.qbtn.ret .qbtn-title { color:var(--green); }
.qbtn-sub { font-size:11px; }
.qbtn.go  .qbtn-sub   { color:rgba(255,255,255,.6); }
.qbtn.ret .qbtn-sub   { color:var(--text-3); }

/* ── Section ── */
.sec    { margin:18px 14px 0; }
.sec-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.sec-title { font-size:12px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.6px; }
.sec-link  { font-size:12px; color:var(--green-mid); font-weight:600; cursor:pointer; }

/* ── 今日紀錄卡 ── */
.dispatch-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:border-color .15s; }
.dispatch-card:active { border-color:var(--green); }
.dc-top     { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.dc-tag     { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; flex-shrink:0; }
.dc-tag.out  { background:#fdf3e0; color:var(--warning); }
.dc-tag.done { background:#e6f4ee; color:var(--success); }
.dc-tag.warn { background:var(--danger-bg); color:var(--danger); }
.dc-time    { font-size:11px; color:var(--text-3); margin-left:auto; }
.dc-bottom  { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.dc-consume { font-size:12px; color:var(--text-3); }
.dc-consume span { font-weight:700; color:var(--green); }
.dc-anomaly { font-size:11px; color:var(--danger); font-weight:600; }

/* ── Bottom Nav ── */
.bnav   { position:fixed; bottom:0; left:0; right:0; width:100%; max-width:480px; margin:0 auto; background:var(--surface); border-top:1px solid var(--border); display:flex; padding:8px 0 22px; z-index:200; }
.nitem  { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:4px 0; }
.nitem-icon  { font-size:20px; line-height:1; color:var(--text-3); }
.nitem-label { font-size:10px; color:var(--text-3); }
.nitem.active .nitem-icon  { color:var(--green); }
.nitem.active .nitem-label { color:var(--green); font-weight:700; }

/* ── Overlay & Sheet ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.52); z-index:300; }
.overlay.show { display:block; }
.sheet { position:fixed; bottom:-100%; left:0; right:0; width:100%; max-width:480px; margin:0 auto; background:var(--surface); border-radius:20px 20px 0 0; z-index:400; transition:bottom .36s cubic-bezier(.32,.72,0,1); height:88vh; display:flex; flex-direction:column; overflow:hidden; }
.sheet.show { bottom:0; }
.sheet-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; flex-shrink:0; }
.sheet-head   { padding:14px 18px 13px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); border-radius:20px 20px 0 0; flex-shrink:0; }
.sheet-title  { font-size:16px; font-weight:700; color:var(--text); }
.sheet-badge  { font-size:12px; color:var(--text-3); background:var(--green-pale); padding:3px 10px; border-radius:20px; }
.sheet-close  { width:28px; height:28px; border-radius:50%; background:var(--bg); border:none; display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--text-2); cursor:pointer; }
.sheet-body   { padding:14px 18px; flex:1; overflow-y:auto; padding-bottom:32px; }

/* ── 下拉選單 ── */
.dropdown-wrap    { margin-bottom:10px; }
.dropdown-trigger { display:flex; align-items:center; gap:8px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; cursor:pointer; transition:border-color .15s; user-select:none; }
.dropdown-trigger.open { border-color:var(--green); border-radius:var(--radius-sm) var(--radius-sm) 0 0; border-bottom-color:transparent; }
.dropdown-icon       { font-size:15px; flex-shrink:0; }
.dropdown-placeholder { flex:1; font-size:14px; color:var(--text-3); }
.dropdown-placeholder.selected { color:var(--text); font-weight:600; }
.dropdown-arrow { font-size:11px; color:var(--text-3); flex-shrink:0; transition:transform .2s; }
.dropdown-arrow.open { transform:rotate(180deg); }
.dropdown-panel { display:none; flex-direction:column; border:1.5px solid var(--green); border-top:none; border-radius:0 0 var(--radius-sm) var(--radius-sm); background:var(--surface); margin-bottom:12px; max-height:420px; overflow:hidden; }
.dropdown-panel.open { display:flex; }
.dropdown-search-row { padding:8px 10px; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--surface); }
.dropdown-search { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px 12px; font-size:13px; color:var(--text); font-family:inherit; outline:none; }
.dropdown-search:focus { border-color:var(--green); }
.dropdown-search::placeholder { color:var(--text-3); }
.dropdown-items { overflow-y:auto; flex:1; }
.dropdown-item { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s; }
.dropdown-item:last-child { border-bottom:none; }
.dropdown-item:active, .dropdown-item:hover { background:var(--green-light); }
.di-ico  { font-size:16px; flex-shrink:0; }
.di-info { flex:1; min-width:0; }
.di-name { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.di-meta { font-size:11px; color:var(--text-3); margin-top:1px; }
.di-unit { font-size:12px; color:var(--text-2); font-weight:600; flex-shrink:0; background:var(--green-light); padding:2px 7px; border-radius:10px; }

/* ── 選定品項輸入卡 ── */
.selected-product-card { background:var(--green-pale); border:1.5px solid var(--green-light); border-radius:var(--radius); padding:14px; margin-bottom:12px; }
.spc-top   { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--green-light); }
.spc-ico   { font-size:20px; }
.spc-info  { flex:1; }
.spc-name  { font-size:14px; font-weight:700; color:var(--green); }
.spc-code  { font-size:11px; color:var(--text-3); margin-top:2px; }
.spc-change    { font-size:12px; color:var(--green-mid); font-weight:600; cursor:pointer; text-decoration:underline; flex-shrink:0; }
.spc-batch-row { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.spc-batch-label { font-size:12px; color:var(--text-3); flex-shrink:0; min-width:44px; }
.spc-date  { flex:1; border:1px solid var(--border); border-radius:6px; padding:6px 8px; font-size:13px; color:var(--text); background:var(--bg); font-family:inherit; outline:none; min-width:0; }
.spc-date:focus { border-color:var(--green); }
.spc-unit  { font-size:11px; color:var(--text-3); flex-shrink:0; }
.spc-batch-del { width:22px; height:22px; border-radius:50%; background:var(--danger-bg); border:none; display:flex; align-items:center; justify-content:center; font-size:11px; cursor:pointer; color:var(--danger); flex-shrink:0; }
.spc-add-batch { width:100%; background:none; border:1px dashed var(--green-mid); border-radius:7px; padding:7px; font-size:12px; color:var(--green-mid); font-family:inherit; cursor:pointer; margin-bottom:12px; }
.spc-add-batch:active { background:var(--green-light); }
.spc-confirm   { width:100%; background:var(--green); color:#fff; border:none; border-radius:var(--radius-sm); padding:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:6px; }
.spc-confirm:active { opacity:.88; }
.spc-confirm .gold { color:var(--gold); }

/* ── 已選清單 ── */
.sel-wrap     { background:var(--green-pale); border:1.5px solid var(--green-light); border-radius:var(--radius); padding:12px 13px; margin-bottom:14px; }
.sel-hd       { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.sel-hd-label { font-size:12px; font-weight:700; color:var(--green); text-transform:uppercase; letter-spacing:.5px; }
.sel-count    { background:var(--green); color:var(--gold); font-size:11px; font-weight:800; padding:2px 9px; border-radius:20px; }
.sel-list-item { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
.sel-list-item:last-child { border-bottom:none; }
.sli-ico   { font-size:15px; }
.sli-info  { flex:1; min-width:0; }
.sli-name  { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sli-batch { font-size:11px; color:var(--text-3); margin-top:2px; }
.sli-del   { width:22px; height:22px; border-radius:50%; background:var(--danger-bg); border:none; display:flex; align-items:center; justify-content:center; font-size:11px; cursor:pointer; color:var(--danger); flex-shrink:0; }

/* ── 數量控制 ── */
.qty-ctrl { display:flex; align-items:center; gap:5px; flex-shrink:0; }
.qty-btn  { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:300; line-height:1; color:var(--text-2); cursor:pointer; user-select:none; flex-shrink:0; }
.qty-btn:active { background:var(--border); }
.qty-num  { font-size:15px; font-weight:800; color:var(--green); width:40px; text-align:center; border:1.5px solid var(--border); border-radius:6px; padding:3px 4px; background:var(--surface); outline:none; font-family:inherit; -moz-appearance:textfield; }
.qty-num:focus { border-color:var(--green); }
.qty-num::-webkit-outer-spin-button, .qty-num::-webkit-inner-spin-button { -webkit-appearance:none; }

/* ── 回庫區塊 ── */
.ret-section-label   { font-size:12px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }
.ret-section-divider { height:1px; background:var(--border); margin:16px 0 14px; }
.ret-toggle-btn { font-size:12px; color:var(--green-mid); background:var(--green-pale); border:1px solid var(--green-light); border-radius:20px; padding:3px 12px; cursor:pointer; font-family:inherit; font-weight:600; }
.ret-toggle-btn:active { background:var(--green-light); }

/* ── 訂單核對 ── */
.order-block    { background:var(--gold-light); border:1.5px solid var(--gold-border); border-radius:var(--radius); padding:12px 14px; margin-bottom:14px; }
.order-hd       { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.order-hd-label { font-size:12px; font-weight:700; color:var(--gold-dark); text-transform:uppercase; letter-spacing:.4px; }
.order-hd-time  { font-size:11px; color:var(--text-3); margin-left:auto; }
.order-rows     { display:flex; flex-direction:column; gap:6px; }
.order-row      { background:var(--surface); border-radius:7px; padding:8px 10px; }
.order-row-top  { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.order-pname    { font-size:12px; font-weight:600; color:var(--text); }
.order-compare  { display:flex; gap:12px; }
.oc-item        { font-size:11px; color:var(--text-3); }
.oc-item span   { font-weight:700; color:var(--text); }
.oc-item.ok   span { color:var(--success); }
.oc-item.warn span { color:var(--danger); }
.anomaly-badge  { display:inline-flex; align-items:center; gap:4px; background:var(--danger-bg); color:var(--danger); font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }

/* ── 備註 / 送出 ── */
.field-label { font-size:12px; font-weight:700; color:var(--text-2); margin-bottom:6px; }
.note-input  { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; font-size:13px; color:var(--text); font-family:inherit; resize:none; outline:none; margin-bottom:16px; min-height:60px; }
.note-input:focus { border-color:var(--green); }
.note-input::placeholder { color:var(--text-3); }
.submit-btn  { width:100%; background:var(--green); color:#fff; border:none; border-radius:var(--radius); padding:15px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity .15s; }
.submit-btn:active   { opacity:.88; }
.submit-btn:disabled { opacity:.4; cursor:not-allowed; }
.submit-btn .gold    { color:var(--gold); }
.back-btn { flex:0 0 80px; background:var(--bg); color:var(--text-2); border:1.5px solid var(--border); border-radius:var(--radius); padding:15px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }

/* ── 空狀態 ── */
.empty-hint { text-align:center; color:var(--text-3); font-size:13px; padding:16px 0; }

/* ── Toast ── */
.toast { position:fixed; bottom:88px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--green); color:#fff; padding:10px 22px; border-radius:24px; font-size:13px; font-weight:600; opacity:0; transition:opacity .22s, transform .22s; z-index:999; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── Page ── */
.page { display:none; }
.page.active { display:block; }
.pg-hd       { background:var(--green); padding:52px 18px 16px; }
.pg-hd-title { color:#fff; font-size:19px; font-weight:700; }
.pg-hd-sub   { color:rgba(255,255,255,.6); font-size:12px; margin-top:3px; }

/* ── 紀錄頁 ── */
.log-group { margin:14px 14px 0; }

/* ── 報表頁 ── */
.report-meta          { margin:14px 14px 0; font-size:12px; color:var(--text-3); }
.report-section       { margin:14px 14px 0; }
.report-section-title { font-size:12px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.report-summary       { margin:10px 14px 0; display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.summary-card         { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px; }
.summary-card-label   { font-size:10px; color:var(--text-3); margin-bottom:4px; }
.summary-card-num     { font-size:18px; font-weight:800; color:var(--green); }
.summary-card-num.warn { color:var(--danger); }
.summary-card-num.ok   { color:var(--success); }
.summary-card-num.gold { color:var(--gold-dark); }
.report-table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border); font-size:12px; }
.report-table th { background:var(--green); color:#fff; padding:8px; text-align:center; font-weight:600; font-size:11px; white-space:nowrap; }
.report-table th:first-child { text-align:left; padding-left:10px; }
.report-table td { padding:8px; border-bottom:1px solid var(--border); text-align:center; color:var(--text-2); }
.report-table td:first-child { text-align:left; font-weight:600; color:var(--text); padding-left:10px; white-space:normal; word-break:break-all; min-width:80px; }
.report-table tr:last-child td { border-bottom:none; }
.report-table tr.anomaly td { background:#fff8f8; }
.report-table .num-ok   { color:var(--success); font-weight:700; }
.report-table .num-warn { color:var(--danger); font-weight:700; }
.report-table .num-gold { color:var(--gold-dark); font-weight:700; }

/* ── 手機卡片 ── */
.mob-card { padding:10px 14px; border-bottom:1px solid var(--border); }
.mob-card:last-child { border-bottom:none; }
.mob-card.rtn { background:var(--gold-light); }
.mc-name    { font-weight:700; color:var(--text); font-size:13px; }
.mc-batches { display:flex; flex-direction:column; gap:4px; margin-top:5px; }
.mc-batch-row { display:flex; align-items:center; justify-content:space-between; padding:3px 0 3px 8px; border-left:2px solid var(--border); }
.mc-exp  { font-size:11px; color:var(--text-3); font-family:monospace; }
.mc-nums { display:flex; gap:10px; flex-wrap:wrap; }
.mc-n    { font-size:12px; color:var(--text-3); }
.mc-n b  { font-weight:700; color:var(--text); }
.mc-n.warn { color:var(--warning); font-weight:600; }

/* ── 登入畫面 ── */
.login-overlay    { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; background:var(--green); padding:20px; }
.login-card       { background:var(--surface); border-radius:var(--radius); padding:36px 28px; width:100%; max-width:360px; box-shadow:0 8px 32px rgba(0,0,0,.15); }
.login-logo       { text-align:center; margin-bottom:24px; }
.login-logo-icon  { font-size:36px; margin-bottom:8px; }
.login-logo-title { font-size:18px; font-weight:700; color:var(--green); }
.login-logo-sub   { font-size:12px; color:var(--text-3); margin-top:4px; }
.login-field      { margin-bottom:16px; }
.login-label      { display:block; font-size:13px; font-weight:600; color:var(--text-2); margin-bottom:6px; }
.login-input      { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:15px; outline:none; transition:border-color .2s; }
.login-input:focus { border-color:var(--green); }
.login-btn  { width:100%; padding:12px; background:var(--green); color:#fff; font-size:15px; font-weight:700; border:none; border-radius:var(--radius-sm); cursor:pointer; margin-top:8px; }
.login-error { color:var(--danger); font-size:13px; text-align:center; margin-top:12px; min-height:18px; }
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">📦</div>
      <div class="login-logo-title">餐飲配送庫存管理</div>
      <div class="login-logo-sub">請輸入同仁編號與密碼登入</div>
    </div>
    <form onsubmit="handleLogin(event)">
      <div class="login-field">
        <label class="login-label">同仁編號</label>
        <input class="login-input" id="loginCode" type="text" placeholder="例：A24010001" autocomplete="username">
      </div>
      <div class="login-field">
        <label class="login-label">密碼</label>
        <input class="login-input" id="loginPassword" type="password" autocomplete="current-password">
      </div>

<script>
// ── API 路徑 ──
var API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:3000' : '';

// ── ERP 認證設定（僅供 auth.js 登入用）──
var APP_CONFIG = {
  BASE_URL: 'https://erp2.dayungs.com',
};

// ============================================================
// auth.js
// ============================================================
var AUTH_KEYS = {
  ACCESS:     'auth_access_token',
  REFRESH:    'auth_refresh_token',
  EMPLOYEE:   'auth_employee',
  EXPIRES_AT: 'auth_expires_at',
};

function login(code, password) {
  return fetch(APP_CONFIG.BASE_URL + '/api/v1/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: code, password: password })
  }).then(function(res) {
    return res.json().then(function(json) {
      if (!res.ok || json.error !== 0) throw new Error(json.message || '登入失敗');
      var data = json.data;
      var expiresAt = Date.now() + (data.token.access_expires_in * 1000);
      localStorage.setItem(AUTH_KEYS.ACCESS,     data.token.access_token);
      localStorage.setItem(AUTH_KEYS.REFRESH,    data.token.refresh_token);
      localStorage.setItem(AUTH_KEYS.EMPLOYEE,   JSON.stringify(data.employee));
      localStorage.setItem(AUTH_KEYS.EXPIRES_AT, expiresAt);
      return data;
    });
  });
}

function logout() {
  var token = localStorage.getItem(AUTH_KEYS.ACCESS);
  if (token) {
    fetch(APP_CONFIG.BASE_URL + '/api/v1/logout', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    }).catch(function() {});
  }
  localStorage.removeItem(AUTH_KEYS.ACCESS);
  localStorage.removeItem(AUTH_KEYS.REFRESH);
  localStorage.removeItem(AUTH_KEYS.EMPLOYEE);
  localStorage.removeItem(AUTH_KEYS.EXPIRES_AT);
  showLoginOverlay();
}

function getAccessToken() {
  var token = localStorage.getItem(AUTH_KEYS.ACCESS);
  if (!token) return null;
  var expiresAt = parseInt(localStorage.getItem(AUTH_KEYS.EXPIRES_AT) || '0');
  if (Date.now() > expiresAt - 300000) renewToken();
  return token;
}

function renewToken() {
  var refreshToken = localStorage.getItem(AUTH_KEYS.REFRESH);
  if (!refreshToken) return;
  fetch(APP_CONFIG.BASE_URL + '/api/v1/token/renew', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refreshToken })
  }).then(function(res) { return res.json(); }).then(function(json) {
    if (json.error === 0 && json.data && json.data.token) {
      var t = json.data.token;
      localStorage.setItem(AUTH_KEYS.ACCESS,     t.access_token);
      localStorage.setItem(AUTH_KEYS.REFRESH,    t.refresh_token);
      localStorage.setItem(AUTH_KEYS.EXPIRES_AT, Date.now() + (t.access_expires_in * 1000));
    } else { logout(); }
  }).catch(function() { logout(); });
}

function getEmployee() {
  try { return JSON.parse(localStorage.getItem(AUTH_KEYS.EMPLOYEE)) || null; }
  catch (e) { return null; }
}

function getEmployeeName() {
  var emp = getEmployee();
  return emp ? emp.name : '';
}

function isLoggedIn() {
  return !!localStorage.getItem(AUTH_KEYS.ACCESS) && !!getEmployee();
}

function showLoginOverlay() {
  var el = document.getElementById('loginOverlay');
  if (el) el.style.display = 'flex';
  var c = document.getElementById('loginCode');
  var p = document.getElementById('loginPassword');
  var e = document.getElementById('loginError');
  if (c) c.value = '';
  if (p) p.value = '';
  if (e) e.textContent = '';
}

function hideLoginOverlay() {
  var el = document.getElementById('loginOverlay');
  if (el) el.style.display = 'none';
}

function handleLogin(e) {
  if (e) e.preventDefault();
  var code     = document.getElementById('loginCode').value.trim();
  var password = document.getElementById('loginPassword').value;
  var errEl    = document.getElementById('loginError');
  var btn      = document.getElementById('loginBtn');
  if (!code || !password) { errEl.textContent = '請輸入同仁編號和密碼'; return; }
  btn.disabled = true;
  btn.textContent = '登入中…';
  errEl.textContent = '';
  login(code, password).then(function(data) {
    hideLoginOverlay();
    if (typeof onLoginSuccess === 'function') onLoginSuccess(data);
  }).catch(function(err) {
    errEl.textContent = err.message || '登入失敗，請重試';
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = '登入';
  });
}

function requireAuth(callback) {
  if (isLoggedIn()) { hideLoginOverlay(); if (callback) callback(); }
  else showLoginOverlay();
}

      spec: p.spec || '', unit: p.unit || '件',
      category: p.category || '', icon: categoryIcon(p.category),
    };
  }).sort(function(a, b) { return a.code.localeCompare(b.code); });
}

// 從伺服器代理取得產品清單，失敗則用內嵌靜態資料
function loadAllProducts(productsArr, renderCallback) {
  fetch(API_BASE + '/api/products')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(all) {
      productsArr.length = 0;
      productsArr.push.apply(productsArr, parseProducts(all));
    })
    .catch(function() {
      productsArr.length = 0;
      productsArr.push.apply(productsArr, parseProducts(STATIC_PRODUCTS));
    })
    .then(function() {
      if (renderCallback) renderCallback(productsArr);
    });
}

  else if (type === 'go') renderDropdownItems(products);
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  if (currentSheet) document.getElementById('sheet-' + currentSheet).classList.remove('show');
  setTimeout(function() { selected = {}; resetGoSheet(); }, 400);
}

function resetGoSheet() {
  selected = {};
  currentProduct = null;
  currentBatches = [{ date: '', qty: 1 }];
  hideDropdown();
  var ph = document.getElementById('dropdownPlaceholder');
  if (ph) { ph.textContent = '選擇品項…'; ph.classList.remove('selected'); }
  document.getElementById('goInputArea').style.display = 'none';
  document.getElementById('goSelWrap').style.display = 'none';
  document.getElementById('goSubmitArea').style.display = 'none';
  document.getElementById('goSelBadge').style.display = 'none';
}

// ── 出門登記：下拉選單 ──
function toggleDropdown() { dropdownOpen ? hideDropdown() : showDropdown(); }

function showDropdown() {
  dropdownOpen = true;
  document.getElementById('dropdownPanel').classList.add('open');
  document.getElementById('dropdownTrigger').classList.add('open');
  document.getElementById('dropdownArrow').classList.add('open');
  document.getElementById('dropdownSearch').value = '';
  renderDropdownItems(products);
  setTimeout(function() { document.getElementById('dropdownSearch').focus(); }, 60);
}

function hideDropdown() {
  dropdownOpen = false;
  var panel = document.getElementById('dropdownPanel');
  if (panel) panel.classList.remove('open');
  document.getElementById('dropdownTrigger').classList.remove('open');
  document.getElementById('dropdownArrow').classList.remove('open');
}

function onDropSearch(val) {
  var q = val.trim().toLowerCase();
  var list = q ? products.filter(function(p) {
    return p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q) || p.category.toLowerCase().includes(q);
  }) : products;
  renderDropdownItems(list);
}

function renderDropdownItems(list) {
  var el = document.getElementById('dropdownItems');
  if (!el) return;
  if (!list.length) { el.innerHTML = '<div class="empty-hint">找不到符合產品</div>'; return; }
  var show = list.slice(0, 80);
  var more = list.length - show.length;
  el.innerHTML = show.map(function(p) {
    return '<div class="dropdown-item" onclick="selectProduct(\'' + escHtml(p.code) + '\')">' +
      '<div class="di-ico">' + p.icon + '</div>' +
      '<div class="di-info"><div class="di-name">' + p.name + '</div>' +
      '<div class="di-meta">' + p.code + (p.spec ? '・' + p.spec : '') + '</div></div>' +
      '<div class="di-unit">' + (p.unit || '件') + '</div></div>';
  }).join('') + (more > 0 ? '<div class="empty-hint" style="padding:10px 0">輸入關鍵字縮小範圍（還有 ' + more + ' 筆）</div>' : '');
}

// ── 選定品項 ──
function selectProduct(code) {
  currentProduct = products.find(function(p) { return p.code === code; });
  if (!currentProduct) return;
  currentBatches = [{ date: '', qty: 1 }];
  hideDropdown();
  var ph = document.getElementById('dropdownPlaceholder');
  ph.textContent = currentProduct.name;
  ph.classList.add('selected');
  renderInputArea();
}

function clearProduct() {
  currentProduct = null;
  currentBatches = [{ date: '', qty: 1 }];
  var ph = document.getElementById('dropdownPlaceholder');
  ph.textContent = '選擇品項…';
  ph.classList.remove('selected');
  document.getElementById('goInputArea').style.display = 'none';
}

function requiresExpiry(product) {
  return product && product.code && product.code.charAt(0) === 'A';
}

function renderInputArea() {
  var p = currentProduct;
  document.getElementById('goInputArea').style.display = '';
  var needExpiry = requiresExpiry(p);
  var minDate = today();
  var batchRows = currentBatches.map(function(b, bi) {
    var dateInput = needExpiry
      ? '<input class="spc-date" type="date" value="' + b.date + '" min="' + minDate + '" onchange="setBatch(' + bi + ',this.value)">'
      : '<input class="spc-date" type="date" value="' + b.date + '" onchange="setBatch(' + bi + ',this.value)" style="opacity:0.5" placeholder="選填">';
    return '<div class="spc-batch-row">' +
      '<div class="spc-batch-label">批次 ' + (bi + 1) + '</div>' +
      dateInput +
      '<div class="qty-ctrl">' +
      '<div class="qty-btn" onclick="setBatchQtyInline(' + bi + ',-1)">−</div>' +
      '<input class="qty-num" type="number" id="ibq-' + bi + '" value="' + b.qty + '" min="1" oninput="currentBatches[' + bi + '].qty=parseInt(this.value)||0">' +
      '<div class="qty-btn" onclick="setBatchQtyInline(' + bi + ',1)">+</div>' +
      '</div>' +
      '<span class="spc-unit">' + (p.unit || '件') + '</span>' +
      (currentBatches.length > 1 ? '<button class="spc-batch-del" onclick="delBatchInline(' + bi + ')">✕</button>' : '') +
      '</div>';
  }).join('');
  var expiryHint = needExpiry ? '' : '<div style="font-size:11px;color:var(--text-3);padding:4px 0 0">效期為選填（非 HPP 瓶裝飲品）</div>';
  document.getElementById('selectedProductCard').innerHTML =
    '<div class="spc-top"><div class="spc-ico">' + p.icon + '</div>' +
    '<div class="spc-info"><div class="spc-name">' + p.name + '</div>' +
    '<div class="spc-code">' + p.code + (p.spec ? '・' + p.spec : '') + '</div></div>' +
    '<span class="spc-change" onclick="clearProduct()">重新選擇</span></div>' +
    '<div id="spcBatches">' + batchRows + '</div>' + expiryHint +
    '<button class="spc-add-batch" onclick="addBatchInline()">+ 新增另一批效期</button>' +
    '<button class="spc-confirm" onclick="confirmAdd()">加入清單 <span class="gold">+</span></button>';
}

function setBatch(bi, val) { currentBatches[bi].date = val; }
function setBatchQtyInline(bi, d) {
  var el = document.getElementById('ibq-' + bi);
  var next = Math.max(1, (parseInt(el.value) || 1) + d);
  currentBatches[bi].qty = next; el.value = next;
}
function addBatchInline() { currentBatches.push({ date: '', qty: 1 }); renderInputArea(); }
function delBatchInline(bi) { currentBatches.splice(bi, 1); renderInputArea(); }

function confirmAdd() {
  if (!currentProduct) return;
  if (requiresExpiry(currentProduct) && currentBatches.some(function(b) { return !b.date; })) { showToast('請填寫所有批次的效期'); return; }
  var qtyInputs = document.querySelectorAll('#selectedProductCard .qty-num');
  qtyInputs.forEach(function(el, bi) {
    if (bi < currentBatches.length) currentBatches[bi].qty = parseInt(el.value) || 0;
  });
  if (currentBatches.some(function(b) { return !b.qty || b.qty <= 0; })) { showToast('數量不可為空或 0'); return; }
  var code = currentProduct.code;
  if (!selected[code]) {
    selected[code] = Object.assign({}, currentProduct, { batches: JSON.parse(JSON.stringify(currentBatches)) });
  } else {
    currentBatches.forEach(function(nb) {
      var exist = selected[code].batches.find(function(b) { return b.date === nb.date; });
      if (exist) exist.qty += nb.qty; else selected[code].batches.push(Object.assign({}, nb));
    });
  }
  showToast('✓ 已加入：' + currentProduct.name);
  clearProduct();
  renderSelList();
}

// ── 已選清單 ──
function renderSelList() {
  var keys = Object.keys(selected);
  document.getElementById('goSelNum').textContent = keys.length;
  document.getElementById('goSelBadge').style.display = keys.length ? '' : 'none';
  document.getElementById('goSelWrap').style.display = keys.length ? '' : 'none';
  document.getElementById('goSubmitArea').style.display = keys.length ? '' : 'none';
  if (!keys.length) return;
  document.getElementById('goSelCount').textContent = keys.length + ' 項';
  document.getElementById('goSelList').innerHTML = keys.map(function(k) {
    var it = selected[k];
    var batchInfo = it.batches.map(function(b) { return (b.date ? '效期 ' + b.date + ' × ' : '') + b.qty + (it.unit || '件'); }).join('、');
    return '<div class="sel-list-item"><div class="sli-ico">' + it.icon + '</div>' +
      '<div class="sli-info"><div class="sli-name">' + it.name + '</div>' +
      '<div class="sli-batch">' + batchInfo + '</div></div>' +
      '<button class="sli-del" onclick="removeFromList(\'' + k + '\')">✕</button></div>';
  }).join('');
}

function removeFromList(code) { delete selected[code]; renderSelList(); }

// ── 出門登記送出 ──
function submitGo() {
  var items = {};
  Object.entries(selected).forEach(function(entry) {
    items[entry[0]] = Object.assign({}, entry[1], { returned: null });
  });
  var rec = {
    id: Date.now(),
    time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
    note: document.getElementById('goNote').value,
    items: items,
    status: 'out',
    anomaly: false,
  };
  dispatches.unshift(rec);
  saveDispatches(getEmployeeName(), dispatches);
  syncGoToServer(rec);
  closeSheet();
  setTimeout(function() {
    showToast('✓ 出門登記完成！');
    renderHomeRecords();
    renderLogPage();
    renderReportTab();
  }, 420);
}

// ── 紀錄卡片渲染 ──
function renderDispatchCard(d) {
  if (d.type === 'return') {
    var cards = Object.values(d.items).map(function(it) {
      var batchRows = (it.batches || []).map(function(b) {
        return '<div class="mc-batch-row"><span class="mc-exp" style="margin:0">效期 ' + b.date + '</span>' +
          '<span class="mc-nums" style="gap:8px"><span class="mc-n">收回 <b>' + b.qty + '</b></span></span></div>';
      }).join('');
      return '<div class="mob-card rtn"><div class="mc-name">' + it.name + '</div><div class="mc-batches">' + batchRows + '</div></div>';
    }).join('');
    return '<div class="dispatch-card" style="padding:0;overflow:hidden">' +
      '<div class="dc-top" style="padding:10px 14px"><div class="dc-tag" style="background:#faf7ed;color:var(--gold-dark)">收退換貨</div><div class="dc-time">' + d.time + '</div></div>' +
      '<div style="border-top:1px solid var(--border)">' + cards + '</div>' +
      '<div class="dc-bottom" style="padding:8px 14px"><div class="dc-consume">已入庫</div></div></div>';
  }
  var cards2 = Object.values(d.items).map(function(it) {
    var hasRet = it.returned !== null && it.returned !== undefined;
    var isSingle = it.batches.length === 1;
    var batchRows = it.batches.map(function(b) {
      var retBatch = it.returnBatches ? it.returnBatches.find(function(rb) { return rb.date === b.date; }) : null;
      var retQty = retBatch ? retBatch.qty : null;
      return '<div class="mc-batch-row"><span class="mc-exp" style="margin:0">效期 ' + b.date + '</span>' +
        '<span class="mc-nums" style="gap:8px"><span class="mc-n">帶出 <b>' + b.qty + '</b></span>' +
        (hasRet && retQty !== null ? '<span class="mc-n">繳回 <b>' + retQty + '</b></span>' : '') +
        (hasRet && retQty === null && isSingle ? '<span class="mc-n">繳回 <b>' + it.returned + '</b></span>' : '') +
        (!hasRet ? '<span class="mc-n warn">未繳回</span>' : '') +
        '</span></div>';
    }).join('');
    return '<div class="mob-card"><div class="mc-name">' + it.name + '</div><div class="mc-batches">' + batchRows + '</div></div>';
  }).join('');
  return '<div class="dispatch-card" style="padding:0;overflow:hidden">' +
    '<div class="dc-top" style="padding:10px 14px">' +
    '<div class="dc-tag ' + (d.status === 'out' ? 'out' : 'done') + '">' + (d.status === 'out' ? '出門中' : '已回庫') + '</div>' +
    (d.anomaly ? '<div class="dc-anomaly">⚠ 數量異常</div>' : '') +
    '<div class="dc-time">' + d.time + '</div></div>' +
    '<div style="border-top:1px solid var(--border)">' + cards2 + '</div>' +
    '<div class="dc-bottom" style="padding:8px 14px"><div class="dc-consume">' + (d.status === 'out' ? '尚未回庫' : '已完成') + '</div></div></div>';
}

function renderHomeRecords() {
  var el = document.getElementById('homeRecords');
  if (!el) return;
  var todayStr = new Date().toLocaleDateString('zh-TW');
  var recs = dispatches.filter(function(d) { return new Date(d.id).toLocaleDateString('zh-TW') === todayStr; });
  if (!recs.length) { el.innerHTML = '<div style="text-align:center;padding:32px 0;color:var(--text-3);font-size:13px;">尚無今日紀錄，點「出門登記」開始</div>'; return; }
  el.innerHTML = recs.map(renderDispatchCard).join('');
}

function renderLogPage() {
  var el = document.getElementById('logRecords');
  if (!el) return;
  var todayStr = new Date().toLocaleDateString('zh-TW');
  var recs = dispatches.filter(function(d) { return new Date(d.id).toLocaleDateString('zh-TW') === todayStr; });
  if (!recs.length) { el.innerHTML = '<div style="text-align:center;padding:48px 0;color:var(--text-3);font-size:13px;">今日尚無異動紀錄</div>'; return; }
  el.innerHTML = recs.map(renderDispatchCard).join('');
}

// ── 報表頁 ──
function renderReportTab() {
  var el = document.getElementById('reportContent');
  if (!el) return;
  var doneRecs = dispatches.filter(function(d) { return d.status === 'done' && d.type !== 'return'; });
  if (!doneRecs.length) {
    var outRecs = dispatches.filter(function(d) { return d.status === 'out'; });
    el.innerHTML = outRecs.length
      ? '<div style="text-align:center;padding:60px 0;color:var(--warning);font-size:13px;">尚有 ' + outRecs.length + ' 趟出門中，回庫後自動產生報表</div>'
      : '<div style="text-align:center;padding:60px 0;color:var(--text-3);font-size:13px;">尚無報表，請先完成出門及回庫登記</div>';
    return;
  }
  var rebuildRetSel = {}, rebuildRtnSel = {}, productCodes = [];
  dispatches.forEach(function(d) {
    if (d.type === 'return') {
      Object.entries(d.items).forEach(function(e) {
        var code = e[0], it = e[1];
        if (!rebuildRtnSel[code]) rebuildRtnSel[code] = { name: it.name, icon: it.icon || '📦', unit: it.unit || '件', batches: [] };
        (it.batches || []).forEach(function(b) { rebuildRtnSel[code].batches.push(b); });
      });
    } else if (d.status === 'done') {
      Object.entries(d.items).forEach(function(e) {
        var code = e[0], it = e[1];
        if (productCodes.indexOf(code) === -1) productCodes.push(code);
        if (!rebuildRetSel[code]) rebuildRetSel[code] = { name: it.name, icon: it.icon || '📦', unit: it.unit || '件', takenBatches: [], returnBatches: [] };
        (it.batches || []).forEach(function(b) { rebuildRetSel[code].takenBatches.push(b); });
        (it.returnBatches || []).forEach(function(b) { rebuildRetSel[code].returnBatches.push(b); });
      });
    }
  });
  if (productCodes.length) {
    generateReport(rebuildRetSel, rebuildRtnSel, null);
    var hint = document.createElement('div');
    hint.id = 'appOrderLoadingHint';
    hint.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3);padding:8px 14px;';
    hint.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1s ease-in-out infinite"></span> 訂單資料載入中…';
    var rc = document.getElementById('reportContent');
    if (rc) rc.insertBefore(hint, rc.firstChild);
    fetchOrderData(productCodes).then(function(orderMap) {
      lastOrderMap = orderMap;
      generateReport(rebuildRetSel, rebuildRtnSel, orderMap);
    }).catch(function(err) {
      var h = document.getElementById('appOrderLoadingHint');
      if (h) h.remove();
    });
  } else {
    generateReport(rebuildRetSel, rebuildRtnSel, null);
  }
}

// ── 回庫登記 ──
function openRetSheet() {
  currentSheet = 'ret';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet-ret').classList.add('show');

  retCurrentProduct = null; retCurrentBatches = [{ date: '', qty: 0 }];

function toggleRetDropdown() { retDropdownOpen ? hideRetDropdown() : showRetDropdown(); }
function showRetDropdown() {
  retDropdownOpen = true;
  document.getElementById('retDropdownPanel').classList.add('open');
  document.getElementById('retDropdownTrigger').classList.add('open');
  document.getElementById('retDropdownArrow').classList.add('open');
  document.getElementById('retDropdownSearch').value = '';
  renderRetDropdownItems();
  setTimeout(function() { document.getElementById('retDropdownSearch').focus(); }, 60);
}
function hideRetDropdown() {
  retDropdownOpen = false;
  document.getElementById('retDropdownPanel').classList.remove('open');
  document.getElementById('retDropdownTrigger').classList.remove('open');
  document.getElementById('retDropdownArrow').classList.remove('open');
}
function onRetDropSearch(val) { renderRetDropdownItems(val.trim().toLowerCase()); }

function renderRetDropdownItems(q) {
  var el = document.getElementById('retDropdownItems');
  var outItems = {};
  dispatches.filter(function(d) { return d.status === 'out'; }).forEach(function(d) {
    Object.entries(d.items).forEach(function(entry) {
      if (!outItems[entry[0]]) outItems[entry[0]] = Object.assign({}, entry[1], { code: entry[0], dispatchId: d.id });
    });
  });
  var list = Object.values(outItems);
  if (q) list = list.filter(function(p) { return p.name.toLowerCase().includes(q) || (p.code && p.code.toLowerCase().includes(q)); });
  if (!list.length) {
    el.innerHTML = '<div class="empty-hint">' + (dispatches.some(function(d) { return d.status === 'out'; }) ? '找不到符合品項' : '尚無出門中的品項') + '</div>';
    return;
  }
  el.innerHTML = list.map(function(p) {
    return '<div class="dropdown-item" onclick="selectRetProduct(\'' + escHtml(p.code) + '\')">' +
      '<div class="di-ico">' + p.icon + '</div><div class="di-info"><div class="di-name">' + p.name + '</div>' +
      '<div class="di-meta">帶走 ' + p.batches.reduce(function(a,b) { return a+b.qty; },0) + ' ' + p.unit + '</div></div>' +
      '<div class="di-unit">' + p.unit + '</div></div>';
  }).join('');
}

function selectRetProduct(code) {
  var found = null;
  dispatches.filter(function(d) { return d.status === 'out'; }).forEach(function(d) {
    if (d.items[code]) found = Object.assign({}, d.items[code], { code: code });
  });

  retCurrentProduct = found;
  retCurrentBatches = found.batches.map(function(b) { return { date: b.date, qty: 0 }; });
  hideRetDropdown();
  var ph = document.getElementById('retDropdownPlaceholder');
  ph.textContent = found.name; ph.classList.add('selected');
  renderRetInputArea();
}

function renderRetInputArea() {
  var p = retCurrentProduct;
  document.getElementById('retInputArea').style.display = '';
  var taken = p.batches.reduce(function(a,b) { return a+b.qty; }, 0);
  var batchRows = retCurrentBatches.map(function(b, bi) {
    return '<div class="spc-batch-row">' +
      '<div class="spc-batch-label" style="min-width:80px;font-size:11px;color:var(--text-3)">效期 ' + p.batches[bi].date + '</div>' +
      '<div style="font-size:11px;color:var(--text-3);flex-shrink:0">帶 ' + p.batches[bi].qty + '</div>' +
      '<div class="qty-ctrl"><div class="qty-btn" onclick="setRetBatchQty(' + bi + ',-1)">−</div>' +
      '<input class="qty-num" type="number" id="rbq-' + bi + '" value="' + b.qty + '" min="0" oninput="retCurrentBatches[' + bi + '].qty=parseInt(this.value)||0">' +
      '<div class="qty-btn" onclick="setRetBatchQty(' + bi + ',1)">+</div></div>' +
      '<span class="spc-unit">' + p.unit + '</span></div>';

    '<div class="spc-top"><div class="spc-ico">' + p.icon + '</div>' +
    '<div class="spc-info"><div class="spc-name">' + p.name + '</div>' +
    '<div class="spc-code">共帶走 ' + taken + ' ' + p.unit + '，填寫繳回數量</div></div>' +
    '<span class="spc-change" onclick="clearRetProduct()">重新選擇</span></div>' +
    '<div>' + batchRows + '</div>' +
    '<button class="spc-confirm" style="margin-top:10px" onclick="confirmRetAdd()">加入回庫清單 <span class="gold">+</span></button>';
}

function setRetBatchQty(bi, d) {
  var el = document.getElementById('rbq-' + bi);
  var next = Math.max(0, (parseInt(el.value) || 0) + d);
  retCurrentBatches[bi].qty = next; el.value = next;
}

function clearRetProduct() {

  document.getElementById('retDropdownPlaceholder').textContent = '選擇要回庫的品項…';
  document.getElementById('retDropdownPlaceholder').classList.remove('selected');
  document.getElementById('retInputArea').style.display = 'none';
}

function confirmRetAdd() {
  if (!retCurrentProduct) return;
  var code = retCurrentProduct.code;
  retSelected[code] = {
    name: retCurrentProduct.name, icon: retCurrentProduct.icon, unit: retCurrentProduct.unit,
    takenBatches: retCurrentProduct.batches,

  };

}

function renderRetSelList() {
  var keys = Object.keys(retSelected);
  document.getElementById('retSelCount').textContent = keys.length + ' 項';
  document.getElementById('retSelWrap').style.display = keys.length ? '' : 'none';
  if (!keys.length) { updateRetSubmitVisibility(); return; }
  document.getElementById('retSelList').innerHTML = keys.map(function(k) {
    var it = retSelected[k];
    var taken    = it.takenBatches.reduce(function(a,b) { return a+b.qty; }, 0);
    var returned = it.returnBatches.reduce(function(a,b) { return a+b.qty; }, 0);
    var batchInfo = it.returnBatches.map(function(b) { return '效期 ' + b.date + ' × ' + b.qty + it.unit; }).join('、');
    return '<div class="sel-list-item"><div class="sli-ico">' + it.icon + '</div>' +
      '<div class="sli-info"><div class="sli-name">' + it.name + '</div>' +
      '<div class="sli-batch">帶走 ' + taken + ' → 繳回 ' + returned + ' ' + it.unit + '</div>' +
      '<div class="sli-batch">' + batchInfo + '</div></div>' +
      '<button class="sli-del" onclick="removeRetItem(\'' + k + '\')">✕</button></div>';
  }).join('');
  updateRetSubmitVisibility();
}
function removeRetItem(code) { delete retSelected[code]; renderRetSelList(); }

// ── 收退換貨 ──
function toggleReturnSection() {
  returnSectionOpen = !returnSectionOpen;
  document.getElementById('returnSection').style.display = returnSectionOpen ? '' : 'none';
  document.getElementById('returnToggleBtn').textContent = returnSectionOpen ? '收起 ▴' : '展開 ▾';
  if (returnSectionOpen && products.length > 0) renderRtnDropdownItems(products);
}

function toggleRtnDropdown() { rtnDropdownOpen ? hideRtnDropdown() : showRtnDropdown(); }
function showRtnDropdown() {
  rtnDropdownOpen = true;
  document.getElementById('rtnDropdownPanel').classList.add('open');
  document.getElementById('rtnDropdownTrigger').classList.add('open');
  document.getElementById('rtnDropdownArrow').classList.add('open');
  document.getElementById('rtnDropdownSearch').value = '';
  renderRtnDropdownItems(products);
  setTimeout(function() { document.getElementById('rtnDropdownSearch').focus(); }, 60);
}
function hideRtnDropdown() {
  rtnDropdownOpen = false;
  document.getElementById('rtnDropdownPanel').classList.remove('open');
  document.getElementById('rtnDropdownTrigger').classList.remove('open');
  document.getElementById('rtnDropdownArrow').classList.remove('open');
}
function onRtnDropSearch(val) {
  var q = val.trim().toLowerCase();
  var list = q ? products.filter(function(p) {
    return p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q);
  }) : products;
  renderRtnDropdownItems(list);
}

function renderRtnDropdownItems(list) {
  var el = document.getElementById('rtnDropdownItems');
  if (!el) return;
  if (!list.length) { el.innerHTML = '<div class="empty-hint">找不到符合產品</div>'; return; }
  var show = list.slice(0, 80);
  var more = list.length - show.length;
  el.innerHTML = show.map(function(p) {
    return '<div class="dropdown-item" onclick="selectRtnProduct(\'' + escHtml(p.code) + '\')">' +
      '<div class="di-ico">' + p.icon + '</div><div class="di-info"><div class="di-name">' + p.name + '</div>' +
      '<div class="di-meta">' + p.code + (p.spec ? '・' + p.spec : '') + '</div></div>' +
      '<div class="di-unit">' + (p.unit || '件') + '</div></div>';
  }).join('') + (more > 0 ? '<div class="empty-hint" style="padding:8px 0">輸入關鍵字縮小範圍（還有 ' + more + ' 筆）</div>' : '');
}

function selectRtnProduct(code) {
  rtnCurrentProduct = products.find(function(p) { return p.code === code; });
  if (!rtnCurrentProduct) return;
  rtnCurrentBatches = [{ date: '', qty: 1 }];
  hideRtnDropdown();
  var ph = document.getElementById('rtnDropdownPlaceholder');
  ph.textContent = rtnCurrentProduct.name; ph.classList.add('selected');
  renderRtnInputArea();
}
function clearRtnProduct() {
  rtnCurrentProduct = null; rtnCurrentBatches = [{ date: '', qty: 1 }];
  document.getElementById('rtnDropdownPlaceholder').textContent = '選擇退換貨品項…';
  document.getElementById('rtnDropdownPlaceholder').classList.remove('selected');
  document.getElementById('rtnInputArea').style.display = 'none';
}

function renderRtnInputArea() {
  var p = rtnCurrentProduct;
  document.getElementById('rtnInputArea').style.display = '';
  var needExpiry = requiresExpiry(p);
  var batchRows = rtnCurrentBatches.map(function(b, bi) {
    var dateInput = needExpiry
      ? '<input class="spc-date" type="date" value="' + b.date + '" onchange="rtnCurrentBatches[' + bi + '].date=this.value">'
      : '<input class="spc-date" type="date" value="' + b.date + '" onchange="rtnCurrentBatches[' + bi + '].date=this.value" style="opacity:0.5">';
    return '<div class="spc-batch-row"><div class="spc-batch-label">批次 ' + (bi+1) + '</div>' +
      dateInput +
      '<div class="qty-ctrl"><div class="qty-btn" onclick="setRtnQty(' + bi + ',-1)">−</div>' +
      '<input class="qty-num" type="number" id="rtnq-' + bi + '" value="' + b.qty + '" min="1" oninput="rtnCurrentBatches[' + bi + '].qty=parseInt(this.value)||0">' +
      '<div class="qty-btn" onclick="setRtnQty(' + bi + ',1)">+</div></div>' +
      '<span class="spc-unit">' + (p.unit || '件') + '</span>' +
      (rtnCurrentBatches.length > 1 ? '<button class="spc-batch-del" onclick="delRtnBatch(' + bi + ')">✕</button>' : '') + '</div>';
  }).join('');
  var expiryHint = needExpiry ? '' : '<div style="font-size:11px;color:var(--text-3);padding:4px 0 0">效期為選填（非 HPP 瓶裝飲品）</div>';
  document.getElementById('rtnSelectedProductCard').innerHTML =
    '<div class="spc-top"><div class="spc-ico">' + p.icon + '</div>' +
    '<div class="spc-info"><div class="spc-name">' + p.name + '</div>' +
    '<div class="spc-code">' + p.code + (p.spec ? '・' + p.spec : '') + '</div></div>' +
    '<span class="spc-change" onclick="clearRtnProduct()">重新選擇</span></div>' +
    '<div>' + batchRows + '</div>' + expiryHint +
    '<button class="spc-add-batch" onclick="addRtnBatch()">+ 新增另一批效期</button>' +
    '<button class="spc-confirm" style="margin-top:10px;background:var(--gold-dark)" onclick="confirmRtnAdd()">加入退換貨清單 <span style="color:var(--green)">+</span></button>';
}

function setRtnQty(bi, d) {
  var el = document.getElementById('rtnq-' + bi);
  var next = Math.max(1, (parseInt(el.value) || 1) + d);
  rtnCurrentBatches[bi].qty = next; el.value = next;
}
function addRtnBatch() { rtnCurrentBatches.push({ date: '', qty: 1 }); renderRtnInputArea(); }
function delRtnBatch(bi) { rtnCurrentBatches.splice(bi, 1); renderRtnInputArea(); }

function confirmRtnAdd() {
  if (!rtnCurrentProduct) return;
  if (requiresExpiry(rtnCurrentProduct) && rtnCurrentBatches.some(function(b) { return !b.date; })) { showToast('請填寫所有批次的效期'); return; }
  var qtyInputs = document.querySelectorAll('#rtnSelectedProductCard .qty-num');
  qtyInputs.forEach(function(el, bi) {
    if (bi < rtnCurrentBatches.length) rtnCurrentBatches[bi].qty = parseInt(el.value) || 0;
  });
  if (rtnCurrentBatches.some(function(b) { return !b.qty || b.qty <= 0; })) { showToast('數量不可為空或 0'); return; }
  var code = rtnCurrentProduct.code;
  if (!rtnSelected[code]) {
    rtnSelected[code] = Object.assign({}, rtnCurrentProduct, { batches: JSON.parse(JSON.stringify(rtnCurrentBatches)) });
  } else {
    rtnCurrentBatches.forEach(function(nb) {
      var exist = rtnSelected[code].batches.find(function(b) { return b.date === nb.date; });
      if (exist) exist.qty += nb.qty; else rtnSelected[code].batches.push(Object.assign({}, nb));
    });
  }
  showToast('✓ 退換貨已加入：' + rtnCurrentProduct.name);
  clearRtnProduct(); renderRtnSelList(); updateRetSubmitVisibility();
}

function renderRtnSelList() {
  var keys = Object.keys(rtnSelected);
  document.getElementById('rtnSelWrap').style.display = keys.length ? '' : 'none';
  if (!keys.length) return;
  document.getElementById('rtnSelCount').textContent = keys.length + ' 項';
  document.getElementById('rtnSelList').innerHTML = keys.map(function(k) {
    var it = rtnSelected[k];
    var batchInfo = it.batches.map(function(b) { return '效期 ' + b.date + ' × ' + b.qty + (it.unit||'件'); }).join('、');
    return '<div class="sel-list-item"><div class="sli-ico">' + it.icon + '</div>' +
      '<div class="sli-info"><div class="sli-name">' + it.name + '</div>' +
      '<div class="sli-batch">' + batchInfo + '</div></div>' +
      '<button class="sli-del" onclick="removeRtnItem(\'' + k + '\')">✕</button></div>';
  }).join('');
}
function removeRtnItem(code) { delete rtnSelected[code]; renderRtnSelList(); updateRetSubmitVisibility(); }

function updateRetSubmitVisibility() {
  var hasRet = Object.keys(retSelected).length > 0;
  var hasRtn = Object.keys(rtnSelected).length > 0;
  document.getElementById('retSubmitArea').style.display = (hasRet || hasRtn) ? '' : 'none';
  document.getElementById('retSelBadge').style.display   = (hasRet || hasRtn) ? '' : 'none';
  document.getElementById('retSelNum').textContent = Object.keys(retSelected).length + Object.keys(rtnSelected).length;
}

// ── 回庫步驟2：訂單核對 ──
function goRetStep2() {
  var outItems = {};
  dispatches.forEach(function(d) {
    if (d.status === 'out') Object.entries(d.items).forEach(function(e) { outItems[e[0]] = e[1].name; });
  });
  var missing = Object.entries(outItems).filter(function(e) { return !retSelected[e[0]]; }).map(function(e) { return e[1]; });
  if (missing.length > 0) {
    showToast('尚未輸入：' + missing.slice(0, 2).join('、') + (missing.length > 2 ? ' 等 ' + missing.length + ' 項' : ''));
    return;
  }
  document.getElementById('retDropdownWrap').style.display = 'none';
  document.getElementById('retInputArea').style.display = 'none';
  document.getElementById('retSelWrap').style.display = 'none';
  document.getElementById('retSubmitArea').style.display = 'none';
  document.getElementById('returnSection').style.display = 'none';
  document.getElementById('retSectionLabel1').style.display = 'none';
  document.getElementById('retSectionDivider').style.display = 'none';
  document.getElementById('retSectionLabel2').style.display = 'none';
  document.getElementById('ret-s2').style.display = '';

  var orderBlock = document.getElementById('orderBlock');
  orderBlock.innerHTML = '<div class="order-hd"><div class="order-hd-label">📋 訂單核對結果</div></div>' +
    '<div style="text-align:center;padding:20px 0;color:var(--text-3);font-size:13px;">' +
    '<div style="margin-bottom:8px">查詢訂單中…</div>' +
    '<div style="width:32px;height:32px;border:3px solid var(--gold-border);border-top-color:var(--gold-dark);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto"></div></div>';

  var returnedData = {};
  Object.entries(retSelected).forEach(function(e) {
    var code = e[0], it = e[1];
    var taken    = it.takenBatches.reduce(function(a,b) { return a+b.qty; }, 0);
    var returned = it.returnBatches.reduce(function(a,b) { return a+b.qty; }, 0);
    returnedData[code] = { name: it.name, icon: it.icon, taken: taken, returned: returned, consumed: taken - returned, isReturn: false };
  });
  Object.entries(rtnSelected).forEach(function(e) {
    var code = e[0], it = e[1];
    var qty = it.batches.reduce(function(a,b) { return a+b.qty; }, 0);
    if (returnedData[code]) returnedData[code].returnQty = qty;
    else returnedData[code] = { name: it.name, icon: it.icon, taken: 0, returned: qty, consumed: 0, isReturn: true };
  });

  var retCodes = Object.keys(retSelected);
  (retCodes.length ? fetchOrderData(retCodes) : Promise.resolve(null))
    .then(function(apiData) { renderOrderCompare(returnedData, apiData); })
    .catch(function(err)    { renderOrderCompare(returnedData, null, err.message); });
}

function backRetStep1() {
  document.getElementById('ret-s2').style.display = 'none';
  document.getElementById('retDropdownWrap').style.display = '';
  document.getElementById('retSectionLabel1').style.display = '';
  document.getElementById('retSectionDivider').style.display = '';
  document.getElementById('retSectionLabel2').style.display = 'flex';
  if (returnSectionOpen) document.getElementById('returnSection').style.display = '';
  updateRetSubmitVisibility();
  if (Object.keys(retSelected).length) document.getElementById('retSelWrap').style.display = '';
  if (Object.keys(rtnSelected).length) document.getElementById('rtnSelWrap').style.display = '';
}

// ── 回庫送出 ──
function submitRet() {
  Object.entries(retSelected).forEach(function(e) {
    var code = e[0], it = e[1];
    var returned = it.returnBatches.reduce(function(a,b) { return a+b.qty; }, 0);
    dispatches.forEach(function(d) {
      if (d.status === 'out' && d.items[code]) {
        d.items[code].returned = returned;
        d.items[code].returnBatches = JSON.parse(JSON.stringify(it.returnBatches));
      }
    });
  });
  var nowTime = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  dispatches.forEach(function(d) {
    if (d.status === 'out') {
      if (Object.values(d.items).every(function(it) { return it.returned !== null; })) {
        d.status = 'done';
        d.returnTime = nowTime;
      }
    }
  });
  var rtnSnap = JSON.parse(JSON.stringify(rtnSelected));
  if (Object.keys(rtnSnap).length) {
    dispatches.unshift({ id: Date.now(), time: nowTime, type: 'return', items: rtnSnap });
  }
  saveDispatches(getEmployeeName(), dispatches);
  syncRetToServer(rtnSnap);
  generateReport(retSelected, rtnSnap, lastOrderMap);
  closeSheet();
  setTimeout(function() { showToast('✓ 回庫登記完成！報表已更新'); renderHomeRecords(); renderLogPage(); renderReportTab(); }, 420);
}

// ── 訂單 API（透過伺服器代理）──
function fetchOrderData(productCodes) {
  var todayStr = new Date().toISOString().slice(0, 10);
  var driverName = getEmployeeName();
  return fetch(API_BASE + '/api/orders?date=' + todayStr + '&driver=' + encodeURIComponent(driverName))
    .then(function(res) {
      if (!res.ok) throw new Error('API 錯誤 ' + res.status);
      return res.json();
    })
    .then(function(allRows) {
      var codeSet = new Set(productCodes);
      var orderMap = {};
      allRows.forEach(function(row) {
        if (row.item_type === '換貨-收回') return;
        if (!codeSet.has(row.product_code)) return;
        if (!orderMap[row.product_code]) orderMap[row.product_code] = { total_qty: 0, clients: [] };
        orderMap[row.product_code].total_qty += (row.qty || 0);
        orderMap[row.product_code].clients.push({ client_name: row.client_name, order_no: row.order_no, qty: row.qty, unit: row.unit });
      });
      return orderMap;
    });
}

function renderOrderCompare(returnedData, orderMap, errMsg) {
  var now = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  var orderBlock = document.getElementById('orderBlock');
  var hasAnomaly = false;
  var rows = Object.entries(returnedData).map(function(e) {
    var code = e[0], d = e[1];
    if (d.isReturn) {
      return '<div class="order-row" style="border-left:3px solid var(--gold-dark)"><div class="order-row-top"><div class="order-pname">' + d.icon + ' ' + d.name + '</div>' +
        '<div style="font-size:11px;font-weight:700;color:var(--gold-dark);background:var(--gold-light);padding:2px 8px;border-radius:20px">收退換貨</div></div>' +
        '<div class="order-compare"><div class="oc-item ok">收回 <span>' + d.returned + '</span></div><div class="oc-item ok">已入庫 <span>✓</span></div></div></div>';
    }
    var orderInfo   = orderMap ? (orderMap[code] || null) : null;
    var orderQty    = orderInfo ? orderInfo.total_qty : null;
    var shouldReturn = orderQty !== null ? d.taken - orderQty : null;
    var diff        = shouldReturn !== null ? d.returned - shouldReturn : null;
    var isAnomaly   = diff !== null && diff !== 0;
    if (isAnomaly) hasAnomaly = true;
    var diffLabel = diff === null ? '<div class="oc-item"><span style="color:var(--text-3)">無訂單資料</span></div>'
      : diff === 0 ? '<div class="oc-item">差異 <span style="color:var(--text-3)">0</span></div>'
      : diff > 0   ? '<div class="oc-item ok">差異 <span>+' + diff + '</span></div>'
                   : '<div class="oc-item warn">差異 <span>' + diff + '</span></div>';
    return '<div class="order-row"><div class="order-row-top"><div class="order-pname">' + d.icon + ' ' + d.name + '</div>' +
      (isAnomaly ? '<div class="anomaly-badge">⚠ 異常</div>' : '') + '</div>' +
      '<div class="order-compare" style="flex-wrap:wrap;gap:6px 14px;">' +
      '<div class="oc-item">帶出 <span>' + d.taken + '</span></div><div class="oc-item">繳回 <span>' + d.returned + '</span></div>' +
      (orderQty    !== null ? '<div class="oc-item">訂單 <span>' + orderQty + '</span></div>' : '') +
      (shouldReturn !== null ? '<div class="oc-item ' + (isAnomaly ? 'warn' : '') + '">應繳回 <span>' + shouldReturn + '</span></div>' : '') +
      diffLabel + '</div></div>';
  }).join('');
  var errBanner = errMsg ? '<div style="background:var(--warn-bg);border:1px solid #f0c040;border-radius:8px;padding:9px 12px;font-size:12px;color:var(--warning);margin-bottom:10px;">⚠ 訂單 API 查詢失敗（' + errMsg + '），仍可送出。</div>' : '';
  orderBlock.innerHTML = errBanner +
    '<div class="order-hd"><div class="order-hd-label">📋 訂單核對 — ' + getEmployeeName() + '</div><div class="order-hd-time">' + now + '</div></div>' +
    '<div class="order-rows">' + rows + '</div>';
  var noteEl = document.getElementById('retNote');
  if (hasAnomaly && noteEl && !noteEl.value) noteEl.placeholder = '偵測到數量差異，請說明原因（主管可見）…';
  lastOrderMap = orderMap;
}

// ── 配送報表 ──
function generateReport(retSel, rtnSel, orderMap) {
  var now = new Date();
  var timeStr = now.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  document.getElementById('reportSub').textContent = getEmployeeName() + ' · ' + timeStr;
  var items = {};
  Object.entries(retSel).forEach(function(e) {
    var code = e[0], it = e[1];
    var taken    = it.takenBatches.reduce(function(a,b) { return a+b.qty; }, 0);
    var returned = it.returnBatches.reduce(function(a,b) { return a+b.qty; }, 0);
    var orderEntry  = orderMap ? (orderMap[code] || null) : null;
    var orderQty    = orderEntry !== null ? (orderEntry.total_qty != null ? orderEntry.total_qty : null) : null;
    var shouldReturn = orderQty !== null ? taken - orderQty : null;
    var diff        = shouldReturn !== null ? returned - shouldReturn : null;
    items[code] = { name: it.name, icon: it.icon, unit: it.unit, taken: taken, orderQty: orderQty, shouldReturn: shouldReturn, returned: returned, diff: diff, returnQty: 0 };
  });
  Object.entries(rtnSel).forEach(function(e) {
    var code = e[0], it = e[1];
    var qty = it.batches.reduce(function(a,b) { return a+b.qty; }, 0);
    if (items[code]) items[code].returnQty = qty;
    else items[code] = { name: it.name, icon: it.icon, unit: it.unit, taken: null, orderQty: null, shouldReturn: null, returned: null, diff: null, returnQty: qty, isReturnOnly: true };
  });
  var tT=0, tO=0, tS=0, tR=0, tD=0, tRtn=0;
  Object.values(items).forEach(function(it) {
    if (!it.isReturnOnly) { tT+=(it.taken||0); tO+=(it.orderQty||0); tS+=(it.shouldReturn||0); tR+=(it.returned||0); tD+=(it.diff||0); }
    tRtn += it.returnQty;
  });
  var summaryHTML = '<div class="report-summary">' +
    '<div class="summary-card"><div class="summary-card-label">帶出</div><div class="summary-card-num">' + tT + '</div></div>' +
    '<div class="summary-card"><div class="summary-card-label">訂單</div><div class="summary-card-num">' + tO + '</div></div>' +
    '<div class="summary-card"><div class="summary-card-label">應繳回</div><div class="summary-card-num">' + tS + '</div></div>' +
    '<div class="summary-card"><div class="summary-card-label">實際繳回</div><div class="summary-card-num">' + tR + '</div></div>' +
    '<div class="summary-card"><div class="summary-card-label">差異</div><div class="summary-card-num ' + (tD>0?'ok':tD<0?'warn':'') + '">' + (tD>0?'+':'') + tD + '</div></div>' +
    '<div class="summary-card"><div class="summary-card-label">收退換貨</div><div class="summary-card-num gold">' + tRtn + '</div></div></div>';
  var tableRows = Object.entries(items).map(function(e) {
    var it = e[1];
    var isAnomaly = it.diff !== null && it.diff !== 0;
    return '<tr class="' + (isAnomaly ? 'anomaly' : '') + '">' +
      '<td>' + it.icon + ' ' + it.name + '</td>' +
      '<td>' + (it.taken!=null?it.taken:'-') + '</td>' +
      '<td>' + (it.orderQty!=null?it.orderQty:'-') + '</td>' +
      '<td>' + (it.shouldReturn!=null?it.shouldReturn:'-') + '</td>' +
      '<td>' + (it.returned!=null?it.returned:'-') + '</td>' +
      '<td class="' + (it.diff>0?'num-ok':it.diff<0?'num-warn':'') + '">' + (it.diff!==null?(it.diff>0?'+':'')+it.diff:'-') + '</td>' +
      '<td class="' + (it.returnQty>0?'num-gold':'') + '">' + (it.returnQty!=null?it.returnQty:'-') + '</td></tr>';
  }).join('');
  document.getElementById('reportContent').innerHTML = summaryHTML +
    '<div class="report-section" style="margin-top:14px"><div class="report-section-title">品項明細</div>' +
    '<div style="overflow-x:auto"><table class="report-table"><thead><tr><th>品項</th><th>帶出</th><th>訂單</th><th>應繳</th><th>實繳</th><th>差異</th><th>退換</th></tr></thead>' +
    '<tbody>' + tableRows + '</tbody></table></div></div>';
}

// ── 同步至伺服器 ──
function syncGoToServer(rec) {
  var driverName = getEmployeeName();
  var todayStr   = new Date().toISOString().slice(0, 10);
  fetch(API_BASE + '/api/dispatches', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ driver: driverName, date: todayStr, time: rec.time, note: rec.note || '', items: rec.items })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.id) {
      rec.serverId = data.id;
      saveDispatches(driverName, dispatches);
    }
  }).catch(function(err) { console.warn('出門登記同步失敗:', err); });
}

function syncRetToServer(rtnSel) {
  var doneDispatches = dispatches.filter(function(d) {
    return d.status === 'done' && d.serverId && d.type !== 'return';
  });
  doneDispatches.forEach(function(d, idx) {
    var rg = (idx === 0 && Object.keys(rtnSel).length > 0) ? rtnSel : {};
    fetch(API_BASE + '/api/dispatches/' + d.serverId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ return_time: d.returnTime || null, items: d.items, return_goods: rg, status: 'done' })
    }).catch(function(err) { console.warn('回庫同步失敗:', err); });
  });
}

// ── 重置狀態 ──
function resetAppState() {
  products = []; selected = {}; currentSheet = null; currentProduct = null;
  currentBatches = [{ date: '', qty: 1 }]; dropdownOpen = false; dispatches = [];
  retSelected = {}; retCurrentProduct = null; retCurrentBatches = [{ date: '', qty: 0 }]; retDropdownOpen = false;
  rtnSelected = {}; rtnCurrentProduct = null; rtnCurrentBatches = [{ date: '', qty: 1 }]; rtnDropdownOpen = false;
  returnSectionOpen = false; lastOrderMap = null;
  var homeRecords = document.getElementById('homeRecords');
  if (homeRecords) homeRecords.innerHTML = '<div style="text-align:center;padding:32px 0;color:var(--text-3);font-size:13px;">尚無今日紀錄，點「出門登記」開始</div>';
  var logRecords = document.getElementById('logRecords');
  if (logRecords) logRecords.innerHTML = '';
  switchPage('pg-home', 'nv-home');
}

// ── 初始化 UI ──
function initAppUI() {
  var name     = getEmployeeName();
  var nameEl   = document.getElementById('hdDriverName');
  var avatarEl = document.getElementById('hdAvatar');
  var greetEl  = document.getElementById('hdGreet');
  var logSub   = document.getElementById('logSubTitle');
  if (nameEl)   nameEl.textContent = name;
  if (avatarEl) {
    avatarEl.textContent = name ? name[0] : '';
    avatarEl.style.cursor = 'pointer';
    avatarEl.title = '點擊登出';
    avatarEl.onclick = function() { if (confirm('確定要登出嗎？')) logout(); };
  }
  if (greetEl) {
    var h = new Date().getHours();
    greetEl.textContent = (h < 12 ? '早安' : h < 18 ? '午安' : '晚安') + '，今天辛苦了';
  }
  if (logSub) logSub.textContent = name + ' · 今日紀錄';
}

// ── 恢復今日紀錄（先從伺服器，再 fallback localStorage）──
function restoreTodayDispatches() {
  var driverName = getEmployeeName();
  if (!driverName) return;
  var dateStr = new Date().toISOString().slice(0, 10);

  fetch(API_BASE + '/api/dispatches/raw?date=' + dateStr + '&driver=' + encodeURIComponent(driverName))
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      if (!rows || !rows.length) { restoreFromLocalStorage(driverName, dateStr); return; }
      // 將伺服器原始格式轉回本地 dispatches 格式
      dispatches = rows.map(function(row) {
        return {
          id:         row.id,
          serverId:   row.id,
          time:       row.departure_time,
          note:       row.note || '',
          items:      row.items || {},
          status:     row.status,
          returnTime: row.return_time || null,
          anomaly:    false,
        };
      });
      // 若有 return_goods，新增一筆 return type 紀錄
      var firstWithGoods = rows.find(function(r) { return r.return_goods && Object.keys(r.return_goods).length > 0; });
      if (firstWithGoods) {
        dispatches.unshift({
          id:    'rtn_' + firstWithGoods.id,
          time:  firstWithGoods.departure_time,
          type:  'return',
          items: firstWithGoods.return_goods,
        });
      }
      saveDispatches(driverName, dispatches);
      renderHomeRecords(); renderLogPage(); renderReportTab();
    })
    .catch(function() { restoreFromLocalStorage(driverName, dateStr); });
}

function restoreFromLocalStorage(driverName, dateStr) {
  var key = 'dispatches_' + driverName + '_' + dateStr;
  try {
    var saved = localStorage.getItem(key);
    if (saved) {
      dispatches = JSON.parse(saved);
      renderHomeRecords(); renderLogPage(); renderReportTab();
    }
  } catch (e) { console.warn('localStorage 恢復失敗:', e); }
}

// ── 登入成功回呼 ──
function onLoginSuccess() {
  resetAppState();
  initAppUI();
  restoreTodayDispatches();
}

// ── 啟動 ──
requireAuth(function() {
  initAppUI();
  restoreTodayDispatches();
});
</script>
